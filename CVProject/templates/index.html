<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Behavior Detection System</title>
  <style>
    :root {
      --page-top: #d9f8f4;
      --page-bottom: #bdecef;
      --frame: #f6f5f5;
      --frame-border: #1d1d1d;
      --panel: #d9d9d9;
      --screen: #030303;
      --text: #171717;
      --muted: #404040;
      --yellow: #ffe91a;
      --green: #30d158;
      --red: #ff453a;
      --blue: #1d45ff;
      --orange: #ff9f0a;
      --button-text-light: #ffffff;
      --shadow: 0 18px 36px rgba(23, 23, 23, 0.12);
      --radius-shell: 28px;
      --radius-panel: 24px;
      --radius-pill: 20px;
      --radius-button: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 28px;
      font-family: "Trebuchet MS", "Gill Sans", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.45), transparent 30%),
        linear-gradient(180deg, var(--page-top), var(--page-bottom));
    }

    .shell {
      max-width: 1120px;
      margin: 0 auto;
      background: var(--frame);
      border: 2px solid var(--frame-border);
      border-radius: var(--radius-shell);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .shell-header {
      padding: 20px 24px 18px;
      border-bottom: 2px solid rgba(29, 29, 29, 0.75);
      text-align: center;
      background: rgba(215, 215, 215, 0.72);
    }

    .shell-header h1 {
      margin: 0;
      font-size: clamp(2rem, 4.2vw, 3rem);
      font-weight: 500;
      letter-spacing: 0.05em;
    }

    .shell-body {
      padding: 24px 20px 28px;
      display: grid;
      grid-template-columns: minmax(0, 1.7fr) minmax(320px, 1fr);
      gap: 20px;
      align-items: stretch;
    }

    .media-area {
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-width: 0;
    }

    .screen-wrap {
      position: relative;
      min-height: 360px;
      border: 2px solid var(--frame-border);
      border-radius: var(--radius-panel);
      overflow: hidden;
      background: var(--screen);
    }

    .screen-wrap video {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      background: var(--screen);
    }

    .screen-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255, 255, 255, 0.9);
      font-size: clamp(1.2rem, 2.5vw, 2rem);
      letter-spacing: 0.03em;
      text-transform: lowercase;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    .screen-placeholder.hidden {
      opacity: 0;
    }

    .controls {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      justify-content: flex-start;
    }

    .control-btn {
      min-width: 170px;
      padding: 14px 20px;
      border: 2px solid var(--frame-border);
      border-radius: var(--radius-button);
      font-size: 1.05rem;
      line-height: 1;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease, filter 0.15s ease;
      box-shadow: 0 6px 0 rgba(0, 0, 0, 0.12);
    }

    .control-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      filter: saturate(1.05);
    }

    .control-btn:disabled {
      cursor: not-allowed;
      opacity: 0.55;
      transform: none;
      box-shadow: none;
    }

    .control-btn.upload {
      background: var(--blue);
      color: var(--button-text-light);
    }

    .control-btn.start {
      background: var(--orange);
      color: #111111;
    }

    .control-btn.stop {
      background: var(--red);
      color: #111111;
    }

    .status-panel {
      background: var(--panel);
      border: 2px solid var(--frame-border);
      border-radius: var(--radius-panel);
      padding: 18px 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-width: 0;
    }

    .status-pill {
      border: 2px solid var(--frame-border);
      border-radius: var(--radius-pill);
      padding: 12px 16px;
      text-align: center;
      font-size: clamp(1.35rem, 2.8vw, 1.9rem);
      line-height: 1.1;
      background: var(--yellow);
    }

    .status-pill.status-analyzing {
      background: var(--yellow);
    }

    .status-pill.status-normal {
      background: var(--green);
    }

    .status-pill.status-suspicious {
      background: var(--red);
    }

    .summary {
      display: grid;
      gap: 6px;
      font-size: 1.05rem;
      line-height: 1.3;
    }

    .summary-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .summary-label {
      font-weight: 700;
    }

    .scores-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 8px;
      font-size: 1rem;
      max-height: 100%;
    }

    .scores-list li {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid rgba(23, 23, 23, 0.15);
      padding-bottom: 6px;
    }

    .scores-list li:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .score-label {
      color: var(--text);
    }

    .score-value {
      font-variant-numeric: tabular-nums;
      color: var(--muted);
      white-space: nowrap;
    }

    .status-panel .helper {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.4;
    }

    #fileInput {
      display: none;
    }

    @media (max-width: 900px) {
      body {
        padding: 18px;
      }

      .shell-body {
        grid-template-columns: 1fr;
      }

      .screen-wrap {
        min-height: 280px;
      }

      .controls {
        justify-content: center;
      }

      .control-btn {
        flex: 1 1 180px;
      }
    }

    @media (max-width: 560px) {
      .shell-header h1 {
        letter-spacing: 0.02em;
      }

      .shell-body {
        padding: 18px 14px 22px;
      }

      .status-panel {
        padding: 14px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="shell-header">
      <h1>Webcam-Based Behavior Detection System</h1>
    </section>

    <section class="shell-body">
      <div class="media-area">
        <div class="screen-wrap">
          <video id="video" autoplay playsinline muted></video>
          <div id="screenPlaceholder" class="screen-placeholder"></div>
        </div>

        <canvas id="canvas" width="224" height="224" hidden></canvas>
        <input id="fileInput" type="file" accept="video/*" />

        <div class="controls">
          <button id="uploadBtn" class="control-btn upload" type="button">Upload Video</button>
          <button id="startBtn" class="control-btn start" type="button">Start Monitoring</button>
          <button id="stopBtn" class="control-btn stop" type="button">Stop</button>
        </div>
      </div>

      <aside class="status-panel">
        <div id="statusBanner" class="status-pill status-analyzing">Analyzing...</div>

        <div class="summary">
          <div class="summary-row">
            <span class="summary-label">Predicted Class (Raw):</span>
            <span id="predictedClass">-</span>
          </div>
          <div class="summary-row">
            <span class="summary-label">Stable:</span>
            <span id="stableClass">-</span>
          </div>
        </div>

        <ul id="scoresList" class="scores-list"></ul>
      </aside>
    </section>
  </main>

  <script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const statusBanner = document.getElementById("statusBanner");
    const predictedClassEl = document.getElementById("predictedClass");
    const stableClassEl = document.getElementById("stableClass");
    const scoresList = document.getElementById("scoresList");
    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const uploadBtn = document.getElementById("uploadBtn");
    const fileInput = document.getElementById("fileInput");
    const screenPlaceholder = document.getElementById("screenPlaceholder");

    const LABEL_NAMES = {
      distracted: "Distracted",
      fatigue: "Fatigue",
      focused: "Focused",
      raise_hand: "Raise Hand",
      sleeping: "Sleeping",
      using_smartphone: "Using Smartphone",
      writing_reading: "Writing/Reading"
    };
    const LABEL_ORDER = Object.keys(LABEL_NAMES);
    const SUSPICIOUS_CLASSES = new Set(["distracted", "fatigue", "sleeping", "using_smartphone"]);
    const HISTORY_MS = 2000;
    const MIN_CONFIDENCE = 0.6;
    const LABEL_THRESHOLDS = {
      raise_hand: 0.9,
      focused: 0.05,
      using_smartphone: 0.3
    };

    let mediaStream = null;
    let uploadedVideoUrl = null;
    let loopHandle = null;
    let requestInFlight = false;
    let activeSource = null;
    const history = [];
    let stableLabel = null;
    let pendingLabel = null;
    let pendingSince = null;

    function formatLabel(label) {
      return LABEL_NAMES[label] || label || "-";
    }

    function getThresholdForLabel(label) {
      return LABEL_THRESHOLDS[label] ?? MIN_CONFIDENCE;
    }

    function createScoreRows() {
      scoresList.innerHTML = "";
      for (const label of LABEL_ORDER) {
        const item = document.createElement("li");
        item.dataset.label = label;
        item.innerHTML = `
          <span class="score-label">${formatLabel(label)}</span>
          <span class="score-value">0.00%</span>
        `;
        scoresList.appendChild(item);
      }
    }

    function setScoreRows(scores = []) {
      const scoresByLabel = new Map(scores.map(item => [item.label, Number(item.confidence || 0)]));
      for (const row of scoresList.children) {
        const valueEl = row.querySelector(".score-value");
        const confidence = scoresByLabel.get(row.dataset.label) || 0;
        valueEl.textContent = `${(confidence * 100).toFixed(2)}%`;
      }
    }

    function setStatus(kind, text) {
      statusBanner.classList.remove("status-analyzing", "status-normal", "status-suspicious");
      statusBanner.classList.add(`status-${kind}`);
      statusBanner.textContent = text;
    }

    function setControlsActive(isBusy) {
      startBtn.disabled = isBusy;
      uploadBtn.disabled = isBusy;
      stopBtn.disabled = !isBusy;
    }

    function resetState() {
      history.length = 0;
      stableLabel = null;
      pendingLabel = null;
      pendingSince = null;
      requestInFlight = false;
      predictedClassEl.textContent = "-";
      stableClassEl.textContent = "-";
      setScoreRows();
    }

    function hidePlaceholder() {
      screenPlaceholder.classList.add("hidden");
    }

    function showPlaceholder() {
      screenPlaceholder.classList.remove("hidden");
    }

    async function startCamera() {
      mediaStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
      video.srcObject = mediaStream;
      video.removeAttribute("src");
      await video.play();
      hidePlaceholder();
    }

    function stopCamera() {
      if (!mediaStream) return;
      mediaStream.getTracks().forEach(track => track.stop());
      mediaStream = null;
      video.srcObject = null;
    }

    function stopUploadedVideo() {
      video.pause();
      video.loop = false;
      if (uploadedVideoUrl) {
        URL.revokeObjectURL(uploadedVideoUrl);
        uploadedVideoUrl = null;
      }
      video.removeAttribute("src");
      video.load();
    }

    function clearMonitoringLoop() {
      if (!loopHandle) return;
      clearInterval(loopHandle);
      loopHandle = null;
    }

    function pushHistory(label, confidence, timestamp) {
      history.push({ label, confidence, timestamp });
      while (history.length && (timestamp - history[0].timestamp) > HISTORY_MS) {
        history.shift();
      }
    }

    function pickWindowWinner() {
      if (!history.length) return null;
      const scoreByLabel = {};
      for (const item of history) {
        scoreByLabel[item.label] = (scoreByLabel[item.label] || 0) + item.confidence;
      }

      let bestLabel = null;
      let bestScore = -Infinity;
      for (const [label, score] of Object.entries(scoreByLabel)) {
        if (score > bestScore) {
          bestScore = score;
          bestLabel = label;
        }
      }
      return bestLabel;
    }

    function updateStableLabel(candidateLabel, now) {
      if (!candidateLabel) return stableLabel;
      if (stableLabel === null) {
        stableLabel = candidateLabel;
        pendingLabel = null;
        pendingSince = null;
        return stableLabel;
      }

      if (candidateLabel === stableLabel) {
        pendingLabel = null;
        pendingSince = null;
        return stableLabel;
      }

      if (pendingLabel !== candidateLabel) {
        pendingLabel = candidateLabel;
        pendingSince = now;
        return stableLabel;
      }

      const switchDelayMs = SUSPICIOUS_CLASSES.has(candidateLabel) ? 1000 : 1500;
      if ((now - pendingSince) >= switchDelayMs) {
        stableLabel = candidateLabel;
        pendingLabel = null;
        pendingSince = null;
      }
      return stableLabel;
    }

    function updateStatusFromLabel(label) {
      if (!label || label === "analyzing") {
        setStatus("analyzing", "Analyzing...");
        return;
      }

      if (SUSPICIOUS_CLASSES.has(label)) {
        setStatus("suspicious", "Suspicious");
      } else {
        setStatus("normal", "Normal");
      }
    }

    async function sendFrame() {
      if (requestInFlight || video.readyState < HTMLMediaElement.HAVE_CURRENT_DATA) return;
      if (activeSource === "upload" && video.ended) return;

      requestInFlight = true;
      try {
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imageData = canvas.toDataURL("image/jpeg", 0.85);

        const res = await fetch("/predict", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ image: imageData })
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Prediction failed");

        const now = Date.now();
        const confidence = Number(data.confidence || 0);
        const rawLabel = String(data.predicted_class || "unknown");
        const threshold = getThresholdForLabel(rawLabel);
        const shownCandidate = confidence >= threshold ? rawLabel : "analyzing";

        setScoreRows(Array.isArray(data.scores) ? data.scores : []);
        pushHistory(shownCandidate, confidence, now);

        const winner = pickWindowWinner();
        const shownLabel = updateStableLabel(winner, now);

        predictedClassEl.textContent = formatLabel(rawLabel);
        stableClassEl.textContent = shownLabel && shownLabel !== "analyzing" ? formatLabel(shownLabel) : "-";
        updateStatusFromLabel(shownLabel);
      } catch (err) {
        setStatus("suspicious", `Error: ${err.message}`);
      } finally {
        requestInFlight = false;
      }
    }

    async function beginMonitoring(source) {
      resetState();
      clearMonitoringLoop();
      activeSource = source;
      setStatus("analyzing", "Analyzing...");
      setControlsActive(true);
      hidePlaceholder();
      loopHandle = setInterval(sendFrame, 250);
    }

    async function startMonitoring() {
      if (activeSource) return;
      setControlsActive(true);
      try {
        await startCamera();
        await beginMonitoring("camera");
      } catch (err) {
        activeSource = null;
        stopCamera();
        showPlaceholder();
        setControlsActive(false);
        setStatus("suspicious", `Camera Error: ${err.message}`);
      }
    }

    async function startUploadedVideo(file) {
      if (!file || activeSource) return;
      setControlsActive(true);

      try {
        stopCamera();
        stopUploadedVideo();
        uploadedVideoUrl = URL.createObjectURL(file);
        video.srcObject = null;
        video.src = uploadedVideoUrl;
        video.muted = true;
        video.loop = true;
        await video.play();
        await beginMonitoring("upload");
      } catch (err) {
        activeSource = null;
        stopUploadedVideo();
        showPlaceholder();
        setControlsActive(false);
        setStatus("suspicious", `Video Error: ${err.message}`);
      }
    }

    function stopMonitoring() {
      clearMonitoringLoop();
      stopCamera();
      stopUploadedVideo();
      activeSource = null;
      fileInput.value = "";
      resetState();
      showPlaceholder();
      setControlsActive(false);
      setStatus("analyzing", "Stopped");
    }

    uploadBtn.addEventListener("click", () => {
      if (uploadBtn.disabled) return;
      fileInput.click();
    });

    fileInput.addEventListener("change", async (event) => {
      const [file] = event.target.files || [];
      if (!file) return;
      await startUploadedVideo(file);
    });

    video.addEventListener("loadeddata", hidePlaceholder);
    video.addEventListener("ended", () => {
      if (activeSource === "upload") {
        video.currentTime = 0;
        video.play().catch(() => {});
      }
    });

    startBtn.addEventListener("click", startMonitoring);
    stopBtn.addEventListener("click", stopMonitoring);

    createScoreRows();
    setScoreRows();
    setControlsActive(false);
  </script>
</body>
</html>
